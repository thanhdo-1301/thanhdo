<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Grid Layout</title>
    <link rel="stylesheet" href="./assets/css/grid.css" />
  </head>
  <body>
    <div class="base-grid-container">
      <header class="app-header">
        <h2>HEADER</h2>
      </header>
      <section class="hero-banner">
        <h1>HERO BANNER</h1>
      </section>
      <aside class="filter-sidebar">
        <h3>SIDEBAR</h3>
      </aside>

      <main class="main-products">
        <div class="sub-product-grid">
          <div class="p-card featured">
            <div class="p-img" style="background-color: #fca5a5"></div>
            <h3>Sản Phẩm Nổi Bật (Span 2 Cột)</h3>
            <p>1.500.000đ</p>
          </div>
          <div class="p-card">
            <div class="p-img"></div>
            <h3>Sản phẩm 1</h3>
            <p>200.000đ</p>
          </div>
          <div class="p-card">
            <div class="p-img"></div>
            <h3>Sản phẩm 2</h3>
            <p>300.000đ</p>
          </div>
          <div class="p-card">
            <div class="p-img"></div>
            <h3>Sản phẩm 3</h3>
            <p>400.000đ</p>
          </div>
          <div class="p-card">
            <div class="p-img"></div>
            <h3>Sản phẩm 4</h3>
            <p>500.000đ</p>
          </div>
        </div>
      </main>

      <aside class="ads-aside">
        <h3>ADS</h3>
      </aside>

      <footer class="app-footer">
        <p>FOOTER</p>
      </footer>
    </div>
  </body>
</html>
