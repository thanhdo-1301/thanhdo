<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="./assets/css/positioning.css">
</head>
<body>

    <header class="fixed-header">
        <div class="logo">ShopTLU</div>
        <nav class="nav-links">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>
    <div class="container">
        <aside class="sticky-sidebar">
            <h3>Bộ lọc tìm kiếm</h3>
            <ul>
                <li><label><input type="checkbox"> Danh mục A</label></li>
                <li><label><input type="checkbox"> Danh mục B</label></li>
                <li><label><input type="checkbox"> Danh mục C</label></li>
            </ul>
        </aside>
        <main class="content-area">
            <div class="product-card">
                <div class="badge-hot">HOT</div>
                <div class="product-thumb"></div>
                <div class="product-info">
                    <h4>Sản phẩm cao cấp</h4>
                    <p>Giá: 1.600.000đ</p>
                </div>
            </div>
            <div class="scroll-spacer">
                <p>Thông tin sản phẩm...</p>
            </div>
        </main>
    </div>
    <button class="scroll-to-top">↑</button>
</body>
</html>
