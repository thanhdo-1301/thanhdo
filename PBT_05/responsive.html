<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="./assets/css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">ShopThanhDo
      </div>
      <label for="menu-toggle" class="hamburger">☰</label>
      <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
      <nav class="nav">
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
      </nav>
    </header>

    <div class="main-layout">
      <aside class="sidebar">
        <h3>Bộ lọc</h3>
        <select class="filter-dropdown">
          <option>Tất cả sản phẩm</option>
          <option>Giá thấp đến cao</option>
          <option>Giá cao đến thấp</option>
        </select>
      </aside>

      <main class="product-grid">
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/33438212/pexels-photo-33438212.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 1</h4>
          <p>150.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/17093335/pexels-photo-17093335.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 2</h4>
          <p>250.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/32001753/pexels-photo-32001753.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 3</h4>
          <p>350.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/5869893/pexels-photo-5869893.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 4</h4>
          <p>450.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/10972751/pexels-photo-10972751.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 5</h4>
          <p>550.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/10662385/pexels-photo-10662385.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 6</h4>
          <p>650.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/11371382/pexels-photo-11371382.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 7</h4>
          <p>750.000đ</p>
        </div>
        <div class="product-card">
          <div class="img-box">
            <img src="https://images.pexels.com/photos/3222255/pexels-photo-3222255.jpeg" alt="Product" />
          </div>
          <h4>Sản phẩm 8</h4>
          <p>850.000đ</p>
        </div>
      </main>

      <aside class="ads-bar">
        <h3>Quảng cáo</h3>
        <p>Banner QC</p>
      </aside>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Class 66HTTT2 - Thanh Do - 2451160757</p>
    </footer>
  </body>
</html>
