<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/selectors_test.css">
    <title>Document</title>
    <style>
        h1{
            color: rgb(255, 0, 55);
        }
        .price{
            color: blue;
            font-style: oblique;
        }
        #app header {
            font-size: x-large;
            line-height: 2cap;
        }
        nav a:first-child {
            text-decoration: none;
            color: black;
        }
        .product.featured h2 {
            font-size: 50px;
        }
        article > p{
            font-size: 18px;
        }
        a[href="/"]{
            display: block;
            margin: 10px 50px;
        }
        .top-bar.dark h1{
            background-color:aquamarine;
        }
    </style>
</head>
<body>
    <div id="app">
    <header class="top-bar dark">
        <h1>ShopTLU</h1>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>
    </header>
    <main>
        <article class="product">
            <h2>iPhone 16</h2>
            <p class="price">25.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
        <article class="product featured">
            <h2>MacBook Pro</h2>
            <p class="price">45.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
    </main>
</div>
</body>
</html>
