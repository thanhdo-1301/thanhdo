<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giao diện đăng ký tài khoản</title>
</head>

<body>

  <h1>Đăng ký tài khoản</h1>

  <form action="https://www.google.com/search" method="POST">

    <!-- Fieldset 1: Thông tin cá nhân -->
    <fieldset>
      <legend>Thông tin cá nhân</legend>

      <label for="fullname">Họ và tên *</label><br>
      <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required minlength="2"
        maxlength="50"><br><br>

      <label for="email">Email *</label><br>
      <input type="email" id="email" name="email" placeholder="example@email.com" required><br><br>

      <label for="phone">Số điện thoại</label><br>
      <input type="tel" id="phone" name="phone" placeholder="0912345678" pattern="[0-9]{10}"
        title="Nhập đúng 10 chữ số"><br><br>

      <label for="dob">Ngày sinh</label><br>
      <input type="date" id="dob" name="dob"><br>

    </fieldset>

    <!-- Fieldset 2: Tài khoản -->
    <fieldset>
      <legend>Tài khoản</legend>

      <label for="username">Tên đăng nhập *</label><br>
      <input type="text" id="username" name="username" placeholder="vi_du_user123" required pattern="[a-zA-Z0-9_]{3,20}"
        title="3-20 ký tự, chỉ chữ cái, số và dấu gạch dưới"><br><br>

      <label for="password">Mật khẩu *</label><br>
      <input type="password" id="password" name="password" placeholder="Tối thiểu 8 ký tự" required minlength="8"
        pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 số"><br><br>

      <label for="confirm-password">Xác nhận mật khẩu *</label><br>
      <input type="password" id="confirm-password" name="confirm_password" placeholder="Nhập lại mật khẩu" required
        minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" title="Nhập lại mật khẩu giống trên"><br>

    </fieldset>

    <!-- Fieldset 3: Thông tin giao hàng -->
    <fieldset>
      <legend>Thông tin giao hàng</legend>

      <label for="city">Tỉnh / Thành phố *</label><br>
      <select id="city" name="city" required>
        <option value="" disabled selected>-- Chọn tỉnh/thành --</option>
        <option value="hcm">TP. Hồ Chí Minh</option>
        <option value="hn">Hà Nội</option>
        <option value="dn">Đà Nẵng</option>
        <option value="ct">Cần Thơ</option>
        <option value="hp">Hải Phòng</option>
      </select><br><br>

      <label for="district">Quận / Huyện</label><br>
      <select id="district" name="district">
        <option value="" disabled selected>-- Chọn quận/huyện --</option>
        <option value="Q1">Quận 1</option>
        <option value="HĐ">Quận Hà Đông</option>
        <option value="HY">Quận Hưng Yên</option>
        <option value="TT">Quận Thạch thất</option>
      </select><br><br>

      <label for="address">Địa chỉ chi tiết</label><br>
      <textarea id="address" name="address" rows="3"  placeholder="Số nhà, tên đường, phường/xã..."></textarea><br><br>

      <label>Giới tính</label><br>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Nam</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Nữ</label>
      <input type="radio" id="other" name="gender" value="other">
      <label for="other">Khác</label><br>

    </fieldset>

    <br>
    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">Tôi đồng ý với Điều khoản sử dụng và Chính sách bảo mật</label><br><br>

    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>

  </form>

</body>

</html>
