<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


<h2>HTML5 Validation Test</h2>

<form>
    <p>Case 1: Required (empty)</p>
    <input type="text" required value="">

    <p>Case 2: Email (invalid)</p>
    <input type="email" value="abc">

    <p>Case 3: Number (out of range)</p>
    <input type="number" min="1" max="10" value="15">

    <p>Case 4: Pattern (10 digits)</p>
    <input type="text" pattern="[0-9]{10}" value="abc123">

    <p>Case 5: Password (minlength)</p>
    <input type="password" minlength="8" value="123">

    <br><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
